<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- Запрет масштабирования — важно для мобильного приложения -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Бьюти каталог</title>
  <link rel="stylesheet" href="css/app.css">
  <!-- Telegram Mini App SDK — обязателен для всех TMA -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <!-- Основной контейнер приложения -->
  <div id="app">

    <!-- Сюда динамически рендерятся экраны через JavaScript -->
    <div id="screen-container"></div>

    <!-- Нижняя навигация — постоянная на всех экранах -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-tab="catalog" onclick="App.goTab('catalog')">
        <span class="nav-icon">✂️</span>
        <span class="nav-label">Услуги</span>
      </button>
      <button class="nav-item" data-tab="bookings" onclick="App.goTab('bookings')">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Записи</span>
      </button>
      <button class="nav-item" data-tab="master" onclick="App.goTab('master')">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Мастер</span>
      </button>
    </nav>

  </div>

  <!-- Данные (услуги, слоты) -->
  <script src="js/data.js"></script>
  <!-- Обёртка над Telegram WebApp API -->
  <script src="js/tg.js"></script>
  <!-- Основная логика: роутер, экраны, события -->
  <script src="js/app.js"></script>

</body>
</html>
